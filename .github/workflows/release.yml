name: AGILANG Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  prebuilt-native-runtime:
    name: Build prebuilt native runtime (${{ matrix.platform_tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_tag: linux-x86_64
            os: ubuntu-latest
            artifact_name: agilang-native-runtime-linux-x86_64
          - platform_tag: windows-x86_64
            os: windows-latest
            artifact_name: agilang-native-runtime-windows-x86_64
          - platform_tag: macos-x86_64
            os: macos-13
            artifact_name: agilang-native-runtime-macos-x86_64
          - platform_tag: macos-arm64
            os: macos-latest
            artifact_name: agilang-native-runtime-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build platform prebuilt runtime
        run: python scripts/build_prebuilt_runtime.py --copy-root-native
      - name: Verify generated runtime manifest
        run: python -m agilang.cli runtime platform-matrix
      - name: Upload prebuilt runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            agilang/native/prebuilt/**
            native/prebuilt/**


  mobile-native-runtime:
    name: Prepare mobile native runtime targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate Android/iOS runtime target manifests
        run: python scripts/build_mobile_prebuilt_runtime.py --target all
      - name: Upload mobile runtime target manifests
        uses: actions/upload-artifact@v7
        with:
          name: agilang-mobile-runtime-targets
          path: agilang/native/prebuilt/**

  build:
    name: Build Python package and source release
    runs-on: ubuntu-latest
    needs: [prebuilt-native-runtime, mobile-native-runtime]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download prebuilt runtimes
        uses: actions/download-artifact@v4
        with:
          path: downloaded-prebuilt
      - name: Merge prebuilt runtimes into package tree
        shell: bash
        run: |
          mkdir -p agilang/native/prebuilt native/prebuilt
          find downloaded-prebuilt -type f -path '*/agilang/native/prebuilt/*' -print -exec sh -c 'for f; do rel=${f#*/agilang/native/prebuilt/}; mkdir -p "agilang/native/prebuilt/$(dirname "$rel")"; cp "$f" "agilang/native/prebuilt/$rel"; done' sh {} +
          find downloaded-prebuilt -type f -path '*/native/prebuilt/*' -print -exec sh -c 'for f; do rel=${f#*/native/prebuilt/}; mkdir -p "native/prebuilt/$(dirname "$rel")"; cp "$f" "native/prebuilt/$rel"; done' sh {} +
      - name: Install build tooling
        run: python -m pip install build pytest
      - name: Validate
        shell: bash
        run: |
          python -m pip install -e .[dev]
          python -m pytest -q
          agi --version
          agi check examples
          agi runtime platform-matrix
          agi runtime prebuilt-status
          agi runtime install-prebuilt
          agi runtime doctor
          agi new release smoke app --dir build/scaffold-smoke
          cd build/scaffold-smoke/release-smoke-app
          agi run
          agi test
      - name: Build Python package
        run: python -m build
      - name: Create source archive
        run: python scripts/release.py
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            release/*
            agilang/native/prebuilt/**
